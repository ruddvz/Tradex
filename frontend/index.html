<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- PWA Core -->
    <meta name="theme-color" content="#0b0f16" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0b0f16" />
    <meta name="background-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tradex" />
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />

    <!--
      Web fonts — Apple devices fall back to SF Pro via the native font stacks;
      everyone else gets Inter (instead of Roboto/Segoe) so typography is
      consistent cross-platform. The service worker already caches these.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />

    <!-- SEO + Share -->
    <meta
      name="description"
      content="Tradex — AI-Powered Trading Journal for Forex, Gold, Indices & Stock Traders."
    />
    <meta name="application-name" content="Tradex" />
    <meta property="og:title" content="Tradex | Trader's Performance Lab" />
    <meta
      property="og:description"
      content="Journal, analyze, and improve your trading edge with AI-powered insights."
    />
    <meta property="og:type" content="website" />

    <!-- Icons (iOS prefers 180×180 apple-touch-icon) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="apple-touch-icon" href="/pwa-192.png" sizes="192x192" />
    <!--
      Manifest is injected by vite-plugin-pwa with the correct base path
      (e.g. /Tradex/manifest.webmanifest on GitHub Pages). Do not hard-code a
      second manifest link here — browsers honor the first one found, and a
      base-less /manifest.webmanifest 404s under a project subpath, silently
      breaking installability.
    -->

    <title>Tradex | Trader's Performance Lab</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
