name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tradex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/tradex
      DEBUG: 'true'
      SECRET_KEY: test-secret-key-for-ci-only-32chars-min

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-ci.txt

      - name: Ruff
        run: ruff check backend/app backend/tests

      - name: Black check
        run: black --check backend/app backend/tests

      - name: Alembic upgrade head
        working-directory: backend
        run: alembic upgrade head

      - name: Pytest
        working-directory: backend
        run: python -m pytest tests/ -q --tb=short
