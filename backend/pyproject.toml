[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"app/api/v1/routes.py" = ["E402"]
"app/models/paper.py" = ["E402"]
"app/migrations.py" = ["I001"]
"tests/test_alembic_migrations.py" = ["I001"]
